    pitfall: 'Administrar 30 mL/kg em bolus fixo sem reavaliação intermediária é um erro de protocolo. Muitos pacientes — especialmente cardiopatas e nefropatas — desenvolvem edema pulmonar antes de completar esse volume. O "30 mL/kg" é indicação de início, não de término.',

  },
  {

    titulo: 'Vasopressina: a segunda droga que não se titula',

    porque: 'VASST trial e metanálises confirmam efeito poupador de Nora com vasopressina. Vasopressina age em receptores V1 vasculares por mecanismo calcio-mediado distinto das catecolaminas — mantém eficácia mesmo em choque prolongado com downregulation adrenérgica. SSC 2026 mantém recomendação como segunda droga preferencial.'
  },
  {
    categoria: 'Vasopressores',
    titulo: 'Hidrocortisona: não é rotina, é para o choque refratário',
    cenario: 'Paciente séptico em Nora 0,15 μg/kg/min, PAM 68 mmHg. Residente inicia hidrocortisona 200 mg/dia "para choque séptico".',

  },

  // ── Choque cardiogênico ────────────────────────────────────

    categoria: 'Choque cardiogênico',
    titulo: 'Volume no cardiogênico: o inimigo do VE',

    porque: 'No VE insuficiente, a curva de Frank-Starling já está no platô ou na parte descendente. Volume adicional aumenta pressão de capilar pulmonar (EAP) sem aumentar DC. O VD dilatado (secundário ao EAP e à hipoxemia) piora ainda mais com volume — comprime o VE pelo fenômeno de interdependência ventricular.'
  },
  {
    categoria: 'Choque cardiogênico',

    porque: 'Dobutamina tem efeito dose-dependente: β1 predomina em doses baixas (inotropismo), mas o efeito β2 vasodilatador é clinicamente significativo. Em paciente sem disfunção sistólica, o inotrópico aumenta FC e dilata sem aumentar DC — drop de PAM sem benefício. O eco confirma o diagnóstico antes de escalar inotrópico.'

  // ── TEP / Obstrutivo ───────────────────────────────────────

    porque: 'Mortalidade do TEP maciço sem trombólise é > 50%. A trombólise reduz mortalidade em > 50% nesse subgrupo. Risco de sangramento grave (~2–3%) é claramente superado pelo benefício quando há instabilidade hemodinâmica confirmada. ESC e ACC/AHA endossam trombólise baseada em eco + instabilidade sem necessidade de confirmação tomográfica.'

  },

  // ── Lactato ────────────────────────────────────────────────

    categoria: 'Lactato',
    titulo: 'Lactato alto sem hipoperfusão: não sempre é choque',
    cenario: 'Paciente em uso de metformina, insuficiência renal aguda, lactato 6,2 mmol/L. Equipe trata como choque e escala vasopressor apesar de PAM 75 e SvcO₂ 74%.',

    pitfall: 'Tratar hiperlactatemia isolada com vasopressor em paciente hemodinamicamente estável é errado e pode ser prejudicial. O vasopressor em PAM normal causa vasoconstrição desnecessária, reduz DC e pode piorar a perfusão orgânica — paradoxalmente piora o lactato.',
    porque: 'O lactato tem duas fontes principais: hipoperfusão (tipo A) e causas não-hipóxicas (tipo B). Em tipo B, o excesso de lactato é metabólico ou por falha de clearance — não responde a vasopressor ou volume. O diagnóstico diferencial exige correlação com SvcO₂, Δ pCO₂ e exame clínico completo.'
  },
  {
    categoria: 'Lactato',
    titulo: 'Lactato clearance como meta de ressuscitação',
    cenario: 'Sepse com lactato inicial 4,8 mmol/L. Após 2 h de ressuscitação: lactato 4,3. Equipe considera ressuscitação bem-sucedida porque houve "melhora".',
    pearl: 'Lactato clearance ≥ 10% em 2 h é a meta validada (SSC 2026). Aqui: (4,8 − 4,3) / 4,8 × 100 = 10,4% — borderline, mas atingido. Avalie em conjunto: enchimento capilar < 3 s, PAM em alvo, diurese ≥ 0,5 mL/kg/h, Δ pCO₂ < 6. Lactato isolado não define ressuscitação completa.',
    pitfall: 'Qualquer queda absoluta no lactato (mesmo de 0,2 mmol/L) não é meta — clearance relativo ≥ 10% é o parâmetro validado. E lactato seriado < 2 h entre coletas pode refletir variação analítica, não melhora clínica real. O lactato deve ser usado em contexto com outros marcadores.',
    porque: 'Jones et al. (JAMA 2010): lactato clearance ≥ 10% em 2 h foi não inferior à SvcO₂ como meta de ressuscitação (28% vs 23% mortalidade; diferença não significativa). O mecanismo: clearance rápido reflete que a causa hipóxica foi revertida — o fígado e o rim eliminam lactato quando o fluxo está restaurado.'
  },

    categoria: 'Sepse',
    titulo: 'Culturas antes do ATB — o intervalo aceitável',
    cenario: 'Sepse grave. Médico aguarda 40 min para coletar culturas antes de iniciar ATB porque "não pode iniciar sem coletar".',
    pearl: 'Colha culturas rapidamente (hemocultura × 2 de sítios distintos, + culturas de foco se acessível) e inicie ATB dentro de 1 h do reconhecimento de choque séptico — SSC 2026. Não adie o ATB por mais de 45 min aguardando culturas difíceis de coletar. Se foco não acessível em < 15 min: colha sangue e inicie ATB.',
    pitfall: 'Aguardar coleta de culturas complicadas (urina por cateterismo, secreção de ferida, etc.) para iniciar ATB é o erro. Cada hora de ATB atrasado em choque séptico aumenta mortalidade em ~7–10% (Kumar et al.). A hemocultura é mandatória; as demais são desejáveis, não obrigatórias.',
    porque: 'O valor diagnóstico das culturas coletadas APÓS o início do ATB ainda é significativo para muitos organismos — não é "zero". O custo de atrasar o ATB por mais de 1 h é sistematicamente maior que o custo de ter culturas com rendimento levemente reduzido. SSC 2026 mantém 1 h como meta em choque séptico confirmado.'
  },
  {
    categoria: 'Sepse',
    titulo: 'Acesso periférico para vasopressor: quando é seguro',
    cenario: 'Choque séptico com PAM 52. CVC demorou. Residente aguarda CVC para iniciar vasopressor.',
    pearl: 'SSC 2026: noradrenalina pode ser iniciada em acesso venoso periférico de bom calibre (antecubital, ≥ 18G) enquanto CVC é obtido. Usar concentração padrão (0,04–0,08 mg/mL). Monitorar o acesso a cada 2 h para sinais de extravasamento. CVC deve ser obtido o mais rapidamente possível, mas não deve atrasar o vasopressor.',
    pitfall: 'Aguardar CVC para iniciar vasopressor em choque estabelecido é erro que aumenta exposição à hipotensão — cada minuto sem PAM em alvo agrava lesão orgânica. O risco de extravasamento periférico de noradrenalina é baixo (< 5%) e manejável; o risco de hipotensão prolongada é altíssimo.',
    porque: 'Estudo de Permpikul (2019) e metanálises confirmam segurança de noradrenalina periférica por até 6–12 h em acesso de bom calibre e distante da articulação. Extravasamento grave é raro com concentrações padrão. SSC 2026 incorporou essa evidência como recomendação explícita.'
  }

let filtroAtivo = 'Todos';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return esc(s).replace(/"/g,'&quot;');}

function renderFiltros(){
  const cats = ['Todos', ...Array.from(new Set(pearls.map(p=>p.categoria)))];
  document.getElementById('pp-filters').innerHTML = cats.map(c=>
    '<button class="pp-tag'+(c===filtroAtivo?' active':'')+'" onclick="setFiltro(\''+escAttr(c)+'\')">'+esc(c)+'</button>'
  ).join('');
}
function setFiltro(c){filtroAtivo=c;render();}

function renderCards(){
  const lista = filtroAtivo==='Todos' ? pearls : pearls.filter(p=>p.categoria===filtroAtivo);
  const wrap = document.getElementById('pp-cards');
  if(!lista.length){wrap.innerHTML='<div class="pp-empty">Nenhum card nesta categoria.</div>';return;}
  wrap.innerHTML = lista.map(p=>
    '<div class="pp-card">'+
      '<div class="pp-card-head">'+
        '<span class="pp-card-title">'+esc(p.titulo)+'</span>'+
        '<span class="pp-cat" onclick="setFiltro(\''+escAttr(p.categoria)+'\')" style="cursor:pointer">'+esc(p.categoria)+'</span>'+
      '</div>'+
      '<div class="pp-cenario">'+esc(p.cenario)+'</div>'+
      '<div class="pp-row pp-pearl"><span class="pp-lbl">✓ Pearl</span>'+esc(p.pearl)+'</div>'+
      '<div class="pp-row pp-pitfall"><span class="pp-lbl">✗ Pitfall</span>'+esc(p.pitfall)+'</div>'+
      '<div class="pp-row pp-why"><span class="pp-lbl">Por quê</span>'+esc(p.porque)+'</div>'+
    '</div>'
  ).join('');
}
function render(){renderFiltros();renderCards();}
render();
</script>
</body>
</html>
